<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Config — AppHub Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #0a0a0f;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        animation: float 8s ease-in-out infinite;
      }

      body::before {
        width: 400px;
        height: 400px;
        background: #7c4dff;
        top: -100px;
        right: -100px;
      }

      body::after {
        width: 350px;
        height: 350px;
        background: #448aff;
        bottom: -80px;
        left: -80px;
        animation-delay: -4s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -30px) scale(1.05);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.95);
        }
      }

      .container {
        position: relative;
        z-index: 1;
        max-width: 520px;
        width: 100%;
      }

      .app-icon {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #7c4dff, #448aff);
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(124, 77, 255, 0.3);
        animation: iconPulse 3s ease-in-out infinite;
      }

      .app-icon svg {
        width: 32px;
        height: 32px;
        fill: white;
      }

      @keyframes iconPulse {
        0%,
        100% {
          box-shadow: 0 8px 32px rgba(124, 77, 255, 0.3);
        }
        50% {
          box-shadow: 0 8px 48px rgba(124, 77, 255, 0.5);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      .title {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      .subtitle {
        font-size: 14px;
        color: #64748b;
        font-weight: 500;
      }

      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 32px;
        margin-bottom: 20px;
      }

      .current-domain {
        margin-bottom: 28px;
      }

      .label {
        font-size: 11px;
        font-weight: 700;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }

      .domain-display {
        background: rgba(124, 77, 255, 0.1);
        border: 1px solid rgba(124, 77, 255, 0.2);
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 14px;
        color: #a78bfa;
        font-weight: 600;
        word-break: break-all;
        font-family: "SF Mono", "Fira Code", monospace;
        transition: all 0.3s ease;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .input {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 14px;
        color: #e2e8f0;
        font-family: inherit;
        font-weight: 500;
        outline: none;
        transition: all 0.3s ease;
      }

      .input:focus {
        border-color: rgba(124, 77, 255, 0.5);
        box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.15);
      }

      .input::placeholder {
        color: #475569;
      }

      .input-mono {
        font-family: "SF Mono", "Fira Code", monospace;
      }

      .btn {
        width: 100%;
        padding: 14px 28px;
        background: linear-gradient(135deg, #7c4dff 0%, #448aff 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 20px rgba(124, 77, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 28px rgba(124, 77, 255, 0.5);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .btn .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        display: none;
      }

      .btn.loading .spinner {
        display: block;
      }

      .btn.loading .btn-text {
        opacity: 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        top: 24px;
        right: 24px;
        padding: 14px 22px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        backdrop-filter: blur(20px);
        z-index: 999;
        transform: translateX(120%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        max-width: 360px;
      }

      .toast.show {
        transform: translateX(0);
      }

      .toast.success {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #4ade80;
      }

      .toast.error {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
      }

      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        margin: 24px 0;
      }

      .info-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 0;
      }

      .info-row .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
        box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .info-row .text {
        font-size: 13px;
        color: #94a3b8;
        font-weight: 500;
      }

      .footer {
        text-align: center;
        font-size: 12px;
        color: #334155;
        font-weight: 500;
      }

      @media (max-width: 640px) {
        .title {
          font-size: 22px;
        }
        .card {
          padding: 24px;
        }
        .toast {
          left: 16px;
          right: 16px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="toast" class="toast"></div>

    <div class="container">
      <div class="header">
        <div class="app-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
            />
          </svg>
        </div>
        <h1 class="title">API Domain Config</h1>
        <p class="subtitle">Change the API domain without updating apps</p>
      </div>

      <div class="card">
        <div class="current-domain">
          <div class="label">Current API Domain</div>
          <div class="domain-display" id="currentDomain">Loading...</div>
        </div>

        <div class="info-row">
          <div class="dot" id="statusDot"></div>
          <span class="text" id="statusText">Checking...</span>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <div class="label">New API Domain</div>
          <input
            type="url"
            id="newDomain"
            class="input input-mono"
            placeholder="https://new-api.example.com"
          />
        </div>

        <div class="form-group">
          <div class="label">Admin Password</div>
          <input
            type="password"
            id="password"
            class="input"
            placeholder="Enter admin password"
          />
        </div>

        <button class="btn" id="saveBtn" onclick="saveConfig()">
          <div class="spinner"></div>
          <span class="btn-text">💾 Save Domain</span>
        </button>
      </div>

      <p class="footer">
        AppHub Admin Panel &bull; Changes apply to all connected apps
      </p>
    </div>

    <script>
      const API_CONFIG_URL = "/api/apphub/config";

      async function loadConfig() {
        try {
          const res = await fetch(API_CONFIG_URL);
          const data = await res.json();
          document.getElementById("currentDomain").textContent =
            data.apiBaseUrl;
          document.getElementById("newDomain").value = data.apiBaseUrl;
          document.getElementById("statusDot").style.background = "#4ade80";
          document.getElementById("statusDot").style.boxShadow =
            "0 0 8px rgba(74,222,128,0.5)";
          document.getElementById("statusText").textContent =
            "Config loaded successfully";
        } catch (e) {
          document.getElementById("currentDomain").textContent =
            "Failed to load";
          document.getElementById("statusDot").style.background = "#f87171";
          document.getElementById("statusDot").style.boxShadow =
            "0 0 8px rgba(248,113,113,0.5)";
          document.getElementById("statusText").textContent =
            "Could not reach API";
        }
      }

      async function saveConfig() {
        const btn = document.getElementById("saveBtn");
        const newDomain = document.getElementById("newDomain").value.trim();
        const password = document.getElementById("password").value;

        if (!newDomain) {
          showToast("Please enter a domain URL", "error");
          return;
        }
        if (!password) {
          showToast("Please enter the admin password", "error");
          return;
        }

        btn.classList.add("loading");
        btn.disabled = true;

        try {
          const res = await fetch(API_CONFIG_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              apiBaseUrl: newDomain,
              password: password,
            }),
          });

          const data = await res.json();

          if (res.ok) {
            showToast("✅ Domain updated successfully!", "success");
            document.getElementById("currentDomain").textContent =
              data.apiBaseUrl;
            document.getElementById("password").value = "";
          } else {
            showToast(data.detail || "Failed to update", "error");
          }
        } catch (e) {
          showToast("Network error: " + e.message, "error");
        } finally {
          btn.classList.remove("loading");
          btn.disabled = false;
        }
      }

      function showToast(message, type) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast " + type + " show";
        setTimeout(() => toast.classList.remove("show"), 4000);
      }

      // Enter key support
      document
        .getElementById("password")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") saveConfig();
        });

      loadConfig();
    </script>
  </body>
</html>
